[profile.default]
src = "src"
out = "out"
libs = ["lib"]
dotenv = "../.env"
test = "test"
script = "script"
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
fuzz = { runs = 256 }

[profile.ci]
fuzz = { runs = 1000 }

[rpc_endpoints]
hedera_testnet = "${HEDERA_EVM_RPC_URL}"

[etherscan]
hedera_testnet = { key = "N/A", url = "https://server-verify.hashscan.io/api-verify" }
