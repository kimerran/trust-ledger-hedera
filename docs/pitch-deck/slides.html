<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustLedger — Seed Deck</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Page setup for PDF ── */
@page { size: 1280px 720px; margin: 0; }
html, body { background: #0A0F0E; }

/* ── Slide container ── */
.slide {
  width: 1280px;
  height: 720px;
  background: #0A0F0E;
  position: relative;
  overflow: hidden;
  padding: 44px 52px 36px;
  display: flex;
  flex-direction: column;
  page-break-after: always;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
.slide:last-child { page-break-after: avoid; }

/* ── Glow effect (position: absolute, top-right) ── */
.glow {
  position: absolute;
  top: -50px; right: -50px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(94,207,191,0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.glow-bl {
  top: auto; right: auto;
  bottom: -40px; left: -40px;
  width: 180px; height: 180px;
}

/* ── Z-index: content above glow ── */
.slide > *:not(.glow) { position: relative; z-index: 1; }

/* ── Slide number label ── */
.slide-num {
  font-size: 8px;
  color: #5ECFBF;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 14px;
}

/* ── Slide title ── */
.slide-title {
  font-size: 26px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.5px;
  line-height: 1.15;
  margin-bottom: 16px;
}

/* ── Gradient divider ── */
.divider {
  width: 36px;
  height: 2px;
  background: linear-gradient(90deg, #5ECFBF, transparent);
  margin-bottom: 20px;
  border-radius: 1px;
  flex-shrink: 0;
}

/* ── Bullet list ── */
.bullets { list-style: none; }
.bullets li {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 16px;
}
.bdot {
  width: 5px; height: 5px;
  background: #5ECFBF;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.btext {
  font-size: 11px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}
.btext strong { color: #fff; font-weight: 600; }

/* ── Stat boxes (bottom bar) ── */
.stat-row {
  display: flex;
  gap: 14px;
  margin-top: auto;
  padding-top: 18px;
  border-top: 1px solid rgba(94,207,191,0.10);
}
.stat-box {
  flex: 1;
  background: rgba(94,207,191,0.06);
  border: 1px solid rgba(94,207,191,0.12);
  border-radius: 7px;
  padding: 12px 16px;
}
.stat-val { font-size: 18px; font-weight: 800; color: #5ECFBF; line-height: 1; }
.stat-lbl {
  font-size: 8px;
  color: rgba(255,255,255,0.30);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* ── 3-column grid ── */
.col3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 18px;
  flex: 1;
  align-items: stretch;
}
.col-card {
  background: rgba(94,207,191,0.05);
  border: 1px solid rgba(94,207,191,0.12);
  border-radius: 10px;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
.col-badge {
  display: inline-block;
  background: rgba(94,207,191,0.12);
  border: 1px solid rgba(94,207,191,0.25);
  color: #5ECFBF;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 10px;
  align-self: flex-start;
}
.col-title {
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
  line-height: 1.2;
}
.col-val {
  font-size: 22px;
  font-weight: 800;
  color: #5ECFBF;
  margin-bottom: 8px;
  line-height: 1;
}
.col-desc {
  font-size: 9.5px;
  color: rgba(255,255,255,0.50);
  line-height: 1.55;
  flex: 1;
}

/* ── Callout box ── */
.callout {
  background: rgba(94,207,191,0.05);
  border: 1px solid rgba(94,207,191,0.18);
  border-radius: 7px;
  padding: 12px 18px;
  font-size: 9.5px;
  color: rgba(255,255,255,0.50);
  text-align: center;
  margin-top: 16px;
  line-height: 1.5;
}
.callout strong { color: #5ECFBF; }

/* ── Closing line (italic footer below columns) ── */
.closing {
  font-size: 9.5px;
  color: rgba(255,255,255,0.35);
  text-align: center;
  font-style: italic;
  padding-top: 14px;
  border-top: 1px solid rgba(94,207,191,0.07);
  margin-top: 14px;
}

/* ── Pipeline (How It Works) ── */
.pipeline {
  display: flex;
  align-items: stretch;
  flex: 1;
  gap: 0;
  margin-bottom: 14px;
}
.pipe-step {
  flex: 1;
  background: rgba(94,207,191,0.05);
  border: 1px solid rgba(94,207,191,0.13);
  border-radius: 10px;
  padding: 20px 14px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.pipe-icon { font-size: 24px; margin-bottom: 10px; }
.pipe-lbl {
  font-size: 9px;
  font-weight: 700;
  color: #5ECFBF;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.pipe-desc {
  font-size: 9px;
  color: rgba(255,255,255,0.40);
  line-height: 1.5;
}
.pipe-arrow {
  font-size: 16px;
  color: rgba(94,207,191,0.30);
  padding: 0 10px;
  flex-shrink: 0;
  align-self: center;
}

/* ── Two-column layout ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  flex: 1;
}

/* ── Terminal / dashboard readout ── */
.terminal {
  background: #060C0B;
  border: 1px solid rgba(94,207,191,0.13);
  border-radius: 8px;
  padding: 18px;
  font-family: 'Courier New', 'Consolas', monospace;
  font-size: 9.5px;
  line-height: 1.85;
  color: rgba(255,255,255,0.55);
}
.terminal .tk { color: #5ECFBF; }
.terminal .tv { color: rgba(255,255,255,0.85); }
.terminal .tok { color: #34D399; font-weight: 700; }
.terminal .dim { color: rgba(255,255,255,0.25); }

/* ── Tier cards (Business Model) ── */
.tier-row {
  display: flex;
  gap: 16px;
  flex: 1;
  align-items: stretch;
}
.tier-card {
  flex: 1;
  background: rgba(94,207,191,0.05);
  border: 1px solid rgba(94,207,191,0.13);
  border-radius: 10px;
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
}
.tier-card.featured {
  background: rgba(94,207,191,0.10);
  border-color: rgba(94,207,191,0.32);
}
.tier-name {
  font-size: 9px;
  font-weight: 800;
  color: #5ECFBF;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.tier-price {
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 14px;
  line-height: 1.2;
}
.tier-price span { font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.40); }
.tier-feats { list-style: none; flex: 1; }
.tier-feats li {
  font-size: 9px;
  color: rgba(255,255,255,0.50);
  line-height: 1.7;
}
.tier-feats li::before { content: '· '; color: #5ECFBF; }

/* ── Cover-specific ── */
.cover-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: auto;
}
.logo-mark {
  width: 28px; height: 28px;
  border: 2.5px solid #5ECFBF;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-inner { width: 12px; height: 12px; background: #5ECFBF; border-radius: 2px; }
.logo-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.cover-headline {
  font-size: 48px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -1.5px;
  line-height: 1.1;
}
.cover-headline em { color: #5ECFBF; font-style: normal; }
.cover-tagline {
  font-size: 11px;
  color: rgba(255,255,255,0.30);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 14px;
}
.cover-footer {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: auto;
  padding-top: 24px;
}
.seed-badge {
  background: rgba(94,207,191,0.10);
  border: 1px solid rgba(94,207,191,0.28);
  color: #5ECFBF;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 5px 14px;
  border-radius: 20px;
  text-transform: uppercase;
}
.cover-year { font-size: 10px; color: rgba(255,255,255,0.22); }

/* ── Founder slide ── */
.founder-name {
  font-size: 32px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.founder-role {
  font-size: 10px;
  color: #5ECFBF;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 24px;
}
.why-me {
  background: rgba(94,207,191,0.05);
  border-left: 3px solid #5ECFBF;
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  margin-top: auto;
  font-size: 10.5px;
  color: rgba(255,255,255,0.55);
  font-style: italic;
  line-height: 1.6;
}

/* ── Ask slide ── */
.funds-list { list-style: none; flex: 1; }
.funds-list li {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 20px;
}
.fund-num {
  font-size: 13px;
  font-weight: 800;
  color: #5ECFBF;
  min-width: 24px;
  flex-shrink: 0;
}
.fund-text {
  font-size: 11px;
  color: rgba(255,255,255,0.60);
  line-height: 1.55;
}
.fund-text strong { color: #fff; }
.contact-block {
  background: rgba(94,207,191,0.05);
  border: 1px solid rgba(94,207,191,0.12);
  border-radius: 8px;
  padding: 14px 20px;
  display: flex;
  gap: 32px;
  align-items: center;
  margin-top: auto;
}
.contact-item { font-size: 9px; color: rgba(255,255,255,0.40); }
.contact-item strong { display: block; font-size: 10.5px; color: rgba(255,255,255,0.80); margin-bottom: 2px; }

/* ── Slide footer label ── */
.sfooter {
  position: absolute;
  bottom: 18px;
  right: 22px;
  font-size: 7px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 1;
}
</style>
</head>

<div class="slide" id="s1">
